plugin:
  name: fylr-plugin-datacite
  version: "1"
  l10n: l10n/datacite-loca.csv
  displayname:
    de-DE: DataCite DOI Registrierung
    en-US: DataCite DOI Registration

extensions:
  webhook/register-doi:
    plugin_user:
      base_config: "datacite.api_user"
    exec:
      service: "node"
      commands:
        - prog: "node"
          stdin:
            type: "body"
          stdout:
            type: "body"
          args:
            - type: "value"
              value: "%_exec.pluginDir%/server/webhook/register-doi.js"
            - type: "value"
              value: "%info.json%"

base_config:
  - name: datacite
    parameters:
      repository_id:
        type: text
        position: 0
      password:
        type: text
        position: 1
      doi_prefix:
        type: text
        position: 2
      api_url:
        type: text
        position: 3
        default: "https://api.test.datacite.org"
      collector_name:
        type: text
        position: 4
      publish_as_findable:
        type: bool
        position: 5
        default: false
      detail_url_template:
        type: text
        position: 6
      api_user:
        type: user
        position: 7
  - name: datacite_mapping
    parameters:
      field_mapping:
        type: table
        position: 0
        fields:
          - name: datacite_field
            type: text
            position: 0
          - name: fylr_field_path
            type: text
            position: 1
          - name: default_value
            type: text
            position: 2

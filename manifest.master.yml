plugin:
  name: fylr-plugin-datacite
  version: "1"
  l10n: l10n/datacite-loca.csv
  displayname:
    de-DE: DataCite DOI Registrierung
    en-US: DataCite DOI Registration

extensions:
  webhook/register-doi:
    plugin_user:
      base_config: "datacite_global.api_user"
    exec:
      service: "node"
      commands:
        - prog: "node"
          stdin:
            type: "body"
          stdout:
            type: "body"
          args:
            - type: "value"
              value: "%_exec.pluginDir%/server/webhook/register-doi.js"
            - type: "value"
              value: "%info.json%"

base_config:
  - name: datacite_global
    parameters:
      api_user:
        type: user
        position: 0
  - name: datacite_profiles
    parameters:
      profiles:
        type: table
        position: 0
        fields:
          - name: id
            type: text
            position: 0
          - name: repository_id
            type: text
            position: 1
          - name: password
            type: text
            position: 2
          - name: doi_prefix
            type: text
            position: 3
          - name: api_url
            type: text
            position: 4
            default: "https://api.test.datacite.org"
          - name: collector_name
            type: text
            position: 5
          - name: publish_as_findable
            type: bool
            position: 6
            default: false
          - name: detail_url_template
            type: text
            position: 7
  - name: datacite_field_mappings
    parameters:
      field_mappings:
        type: table
        position: 0
        fields:
          - name: profile_id
            type: text
            position: 0
          - name: datacite_field
            type: text
            position: 1
          - name: fylr_field_path
            type: text
            position: 2
          - name: default_value
            type: text
            position: 3
